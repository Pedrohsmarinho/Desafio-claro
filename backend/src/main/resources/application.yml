spring:
  application:
    name: pedidos-api

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/pedidos_db}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:pedidos_user}
    password: ${DB_PASSWORD:pedidos_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: Pedidos API
    description: API de gestao de pedidos de e-commerce - Desafio Tecnico Claro
    version: 1.0.0

app:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  pedidos:
    limite-maximo: 5

logging:
  level:
    root: INFO
    com.claro.desafio.pedidos: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}, spanId=%X{spanId:-}] - %msg%n"
