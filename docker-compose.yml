services:
  mariadb:
    image: mariadb:11.8.8
    # 3307 (nao 3306) no host: evita conflito com um MariaDB local que
    # porventura ja esteja escutando em 127.0.0.1:3306. Entre containers
    # (backend, etc.) o acesso continua via o nome de servico "mariadb"
    # na porta padrao 3306 - essa publicacao e so para clientes do host
    # (DBeaver, mysql CLI, etc.), nao usada pela aplicacao.
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: pedidos_db
      # sem default: precisam vir do .env na raiz do projeto (gitignored, ver
      # .env.example) - nunca commitar usuario/senha reais do banco.
      MARIADB_USER: ${DB_USERNAME:?defina DB_USERNAME no arquivo .env (ver .env.example)}
      MARIADB_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no arquivo .env (ver .env.example)}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?defina MARIADB_ROOT_PASSWORD no arquivo .env (ver .env.example)}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      # nomes de servico do compose (rede bridge padrao, com DNS interno) no
      # lugar de "localhost" - unico motivo pelo qual esta stack antes exigia
      # network_mode: host era o MariaDB rodar fora do Compose, bindado em
      # 127.0.0.1; agora que o banco tambem esta containerizado, a rede
      # bridge padrao resolve os nomes de servico entre si sem problema.
      DB_URL: ${DB_URL:-jdbc:mariadb://mariadb:3306/pedidos_db}
      # sem default: precisam vir do .env na raiz do projeto (gitignored, ver
      # .env.example) - nunca commitar usuario/senha reais do banco.
      DB_USERNAME: ${DB_USERNAME:?defina DB_USERNAME no arquivo .env (ver .env.example)}
      DB_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no arquivo .env (ver .env.example)}
      # sem default: precisa vir do .env na raiz do projeto (gitignored, ver
      # .env.example) - nunca commitar o valor real do segredo do JWT.
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no arquivo .env (ver .env.example)}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
    depends_on:
      mariadb:
        condition: service_healthy
      tempo:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.13.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.6.8
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      # Socket do Docker (somente leitura): usado pelo Promtail para descobrir
      # os containers em execucao e fazer tail dos logs de cada um.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:3.0.0
    ports:
      - "3200:3200"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # habilita a correlacao trace -> logs/metricas nos paineis de trace
      GF_FEATURE_TOGGLES_ENABLE: traceqlSearch
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  mariadb-data:
  grafana-data:
  loki-data:
  tempo-data:
