spring:
  application:
    name: pedidos-api

  mvc:
    # Sem isso, uma rota inexistente (ex: GET /api/rota-que-nao-existe) cai no
    # tratador padrao de recurso estatico do Spring (Whitelabel Error Page em
    # HTML) em vez de lancar NoHandlerFoundException, que e o que o
    # GlobalExceptionHandler precisa capturar para devolver o mesmo formato
    # JSON de erro usado no resto da API.
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  datasource:
    # valores default apontam para o MariaDB local do desafio; sobrescritos por
    # variaveis de ambiente ao rodar via Docker Compose (ver docker-compose.yml)
    url: ${DB_URL:jdbc:mariadb://localhost:3306/pedidos_db}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:pedidos_user}
    password: ${DB_PASSWORD:pedidos_pass}

  jpa:
    hibernate:
      # o Flyway agora e quem cria/altera o schema (ver db/migration); o
      # Hibernate so confere se as entidades batem com as tabelas reais e
      # falha rapido na subida se divergirem, em vez de alterar algo sozinho.
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      # 100% das requisicoes viram trace no Tempo. Razoavel para o volume de
      # trafego deste desafio; em producao com trafego real, um valor menor
      # (ex: 0.1) evitaria sobrecarregar o coletor.
      probability: 1.0
  otlp:
    tracing:
      # Tempo roda com network_mode: host (assim como backend/prometheus/
      # grafana), entao "localhost" aqui e o host de verdade.
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: Pedidos API
    description: API de gestao de pedidos de e-commerce - Desafio Tecnico Claro
    version: 1.0.0

app:
  security:
    # segredo usado para assinar/validar o JWT (HMAC-SHA256, exige >= 256 bits).
    # sem default aqui de proposito: a aplicacao falha rapido (erro na
    # inicializacao) se JWT_SECRET nao for definido, em vez de cair
    # silenciosamente num valor fraco/conhecido. O valor real e injetado via
    # variavel de ambiente (docker-compose.yml + .env, nunca commitado) ou,
    # rodando fora do Docker, pelo profile "local" (application-local.yml).
    # Ver README (secao JWT) para detalhes.
    jwt-secret: ${JWT_SECRET}
    # 1 hora, em milissegundos
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  pedidos:
    limite-maximo: 5

logging:
  level:
    root: INFO
    com.claro.desafio.pedidos: INFO
  pattern:
    # traceId/spanId (preenchidos no MDC pelo Micrometer Tracing) permitem
    # correlacionar um log no Loki com o trace correspondente no Tempo -
    # e o que possibilita o "clique no log -> veja o trace" no Grafana.
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}, spanId=%X{spanId:-}] - %msg%n"
