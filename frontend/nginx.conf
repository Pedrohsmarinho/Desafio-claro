server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota que nao seja um arquivo estatico cai no index.html,
    # deixando o Angular Router decidir o que renderizar (evita 404 do Nginx
    # ao acessar/atualizar a pagina em rotas como /pedidos ou /dashboard).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|js\.map|css\.map|ico|png|jpg|svg)$ {
        expires 30d;
        access_log off;
    }
}
