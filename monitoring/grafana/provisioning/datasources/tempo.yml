apiVersion: 1

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://localhost:3200
    editable: true
    jsonData:
      # Trace -> Logs: ao abrir um trace no Tempo, "View logs" busca no Loki
      # os logs com o mesmo traceId (correlacao na outra direcao, complementar
      # ao derivedField configurado no datasource do Loki).
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: true
        customQuery: false
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
