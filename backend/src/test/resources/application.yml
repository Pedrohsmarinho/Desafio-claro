spring:
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:pedidosdb-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

app:
  security:
    jwt-secret: teste-segredo-apenas-para-testes-automatizados-nao-usar-em-producao
    jwt-expiration-ms: 3600000
  pedidos:
    limite-maximo: 5

management:
  tracing:
    sampling:
      probability: 0.0
