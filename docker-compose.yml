services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: pedidos_db
      MARIADB_USER: pedidos_user
      MARIADB_PASSWORD: pedidos_pass
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-troque_esta_senha_root}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      # nomes de servico do compose (rede bridge padrao, com DNS interno) no
      # lugar de "localhost" - unico motivo pelo qual esta stack antes exigia
      # network_mode: host era o MariaDB rodar fora do Compose, bindado em
      # 127.0.0.1; agora que o banco tambem esta containerizado, a rede
      # bridge padrao resolve os nomes de servico entre si sem problema.
      DB_URL: ${DB_URL:-jdbc:mariadb://mariadb:3306/pedidos_db}
      DB_USERNAME: ${DB_USERNAME:-pedidos_user}
      DB_PASSWORD: ${DB_PASSWORD:-pedidos_pass}
      JWT_SECRET: ${JWT_SECRET:-WrFvuOmUSYFfbnSRaWDnhGJtws-JPFFuiBf2CcJUZZM917LeTkX-5nqRqoPA3ecE}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
    depends_on:
      mariadb:
        condition: service_healthy
      tempo:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      # Socket do Docker (somente leitura): usado pelo Promtail para descobrir
      # os containers em execucao e fazer tail dos logs de cada um.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # habilita a correlacao trace -> logs/metricas nos paineis de trace
      GF_FEATURE_TOGGLES_ENABLE: traceqlSearch
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  mariadb-data:
  grafana-data:
  loki-data:
  tempo-data:
