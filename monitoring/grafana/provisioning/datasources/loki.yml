apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://localhost:3100
    editable: true
    jsonData:
      # Qualquer log com "traceId=<hex>" vira um link clicavel pro trace
      # correspondente no Tempo - e a correlacao log -> trace no Grafana.
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: 'traceId=([0-9a-f]+)'
          name: TraceID
          url: "$${__value.raw}"
