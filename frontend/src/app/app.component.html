<mat-toolbar class="app-toolbar" *ngIf="autenticado">
  <span class="brand">
    <mat-icon>inventory_2</mat-icon>
    Gestão de Pedidos
  </span>
  <span class="spacer"></span>
  <a mat-button routerLink="/dashboard" routerLinkActive="link-ativo" matTooltip="Dashboard">
    <mat-icon>dashboard</mat-icon>
    <span class="nav-label">Dashboard</span>
  </a>
  <a mat-button routerLink="/pedidos" routerLinkActive="link-ativo" matTooltip="Pedidos">
    <mat-icon>list_alt</mat-icon>
    <span class="nav-label">Pedidos</span>
  </a>
  <span
    class="indicador-saude"
    [class.up]="(saudeApi$ | async) === 'up'"
    [class.down]="(saudeApi$ | async) === 'down'"
    [matTooltip]="rotuloSaude((saudeApi$ | async)!)"
  >
    <span class="ponto"></span>
    <span class="nav-label">API</span>
  </span>
  <button mat-button (click)="sair()" matTooltip="Sair">
    <mat-icon>logout</mat-icon>
    <span class="nav-label">Sair</span>
  </button>
</mat-toolbar>

<div class="page-content">
  <router-outlet />
</div>
