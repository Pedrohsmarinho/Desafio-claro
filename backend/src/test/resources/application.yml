spring:
  # ativa o profile "test", usado por DataSeeder (@Profile("!test")) pra nao
  # rodar o seed de demonstracao durante os testes automatizados - nenhum
  # teste depende dos dados semeados, cada um cria seus proprios
  # usuarios/pedidos via API.
  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:pedidosdb-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop

  # As migrations em db/migration usam sintaxe especifica do dialeto MySQL/
  # MariaDB (ENUM, AUTO_INCREMENT, ENGINE=InnoDB), que nao roda no H2 usado
  # aqui. Testes usam H2 em memoria justamente pela velocidade/isolamento, nao
  # para validar o SQL das migrations - por isso o Flyway fica desligado so
  # neste profile, e o Hibernate volta a criar o schema (create-drop) direto
  # das entidades.
  flyway:
    enabled: false

app:
  security:
    jwt-secret: teste-segredo-apenas-para-testes-automatizados-nao-usar-em-producao
    jwt-expiration-ms: 3600000
  pedidos:
    limite-maximo: 5

management:
  # tracing desligado nos testes: nao ha Tempo rodando no ambiente de teste,
  # e nao queremos tentativas de export OTLP (nem que sejam so logs de erro)
  # poluindo a saida dos testes.
  tracing:
    sampling:
      probability: 0.0
